<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imtihonga Tayyorgarlik</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-color: #f4f4f9;
      --text-color: #333;
      --btn-bg: #0088cc;
      --btn-text: #fff;
    }
    body.dark-mode {
      --bg-color: #1e1e1e;
      --text-color: #f4f4f9;
      --btn-bg: #444;
    }
    body {
      margin: 0; padding: 0;
      background: var(--bg-color); color: var(--text-color);
      font-family: sans-serif; overflow: hidden;
      display: flex; justify-content: center;
    }
    .screen {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      padding: 20px; box-sizing: border-box;
      display: flex; flex-direction: column; align-items: center;
      transition: transform 0.4s ease-in-out;
      overflow-y: auto;
    }
    .active { transform: translateY(0); }
    .hidden-down { transform: translateY(100%); }
    
    h1, h2, h3 { text-align: center; }
    p { font-size: 18px; text-align: center; font-weight: bold; }

    button {
      background: var(--btn-bg); color: var(--btn-text);
      border: none; padding: 15px; margin: 10px; width: 100%; max-width: 400px;
      border-radius: 8px; font-size: 16px; cursor: pointer;
      transition: opacity 0.2s, background 0.3s;
    }
    button:active { opacity: 0.7; }
    button:disabled { cursor: not-allowed; opacity: 0.9; }
    
    .back-btn { background: #cc0000; margin-top: auto; }
    .option-btn { background: #e0e0e0; color: #333; text-align: left; }
    body.dark-mode .option-btn { background: #333; color: #f4f4f9; border: 1px solid #555; }
    
    #options-container { width: 100%; display: flex; flex-direction: column; align-items: center; }

    table { width: 100%; max-width: 400px; border-collapse: collapse; margin-bottom: 20px;}
    th, td { border: 1px solid var(--text-color); padding: 8px; text-align: center; }
    
    .loader { margin-top: 50px; font-weight: bold; font-size: 20px; }

    /* Summary Card Styles */
    .summary-card {
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 15px;
      padding: 15px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      background: rgba(0,0,0,0.05);
    }
    body.dark-mode .summary-card { background: rgba(255,255,255,0.05); border-color: #555; }
    .summary-card p { font-size: 15px; text-align: left; font-weight: normal; margin: 5px 0;}
    .summary-card .q-text { font-weight: bold; margin-bottom: 10px; }
  </style>
</head>
<body class="light-mode">

  <!-- ASOSIY MENYU -->
  <div id="main-screen" class="screen active">
    <h1>Asosiy Menyu</h1>
    <button onclick="showScreen('subjects-screen')">Test boshlash</button>
    <button onclick="loadRating()">Reyting</button>
    <button onclick="toggleNightMode()">Tungi rejim</button>
  </div>

  <!-- FANLAR EKRANI -->
  <div id="subjects-screen" class="screen hidden-down">
    <h2>Fanni tanlang</h2>
    <button onclick="startQuiz('Fan3', 'Pedagogika nazariyasi va tarixi')">Pedagogika nazariyasi</button>
    <button onclick="startQuiz('Fan4', 'Deviantologiya')">Deviantologiya</button>
    <button onclick="startQuiz('Fan5', 'Psixologik maslahat va kouching')">Psixologik maslahat</button>
    <button class="back-btn" onclick="showScreen('main-screen')">Ortga</button>
  </div>

  <!-- TEST EKRANI -->
  <div id="quiz-screen" class="screen hidden-down">
    <h2 id="subject-title"></h2>
    <h3 id="question-counter"></h3>
    <div id="quiz-content" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
      <p id="question-text">Testlar yuklanmoqda...</p>
      <div id="options-container"></div>
      <button id="next-btn" style="display: none; background: #4CAF50;" onclick="nextQuestion()">Keyingi savol ➡</button>
    </div>
    <button class="back-btn" onclick="showScreen('main-screen')">Tugatish</button>
  </div>

  <!-- XULOSA (SUMMARY) EKRANI -->
  <div id="summary-screen" class="screen hidden-down">
    <h2>Natijalar xulosasi</h2>
    <h3 id="final-score-text"></h3>
    <div id="summary-container" style="width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 20px;"></div>
    <button class="back-btn" onclick="showScreen('main-screen')">Asosiy menyuga qaytish</button>
  </div>

  <!-- REYTING EKRANI -->
  <div id="rating-screen" class="screen hidden-down">
    <h2>Reyting (Top 5)</h2>
    <div id="rating-tables" class="loader">Yuklanmoqda...</div>
    <button class="back-btn" onclick="showScreen('main-screen')">Ortga</button>
  </div>

  <!-- JAVASCRIPT QISMI -->
  <script>
    // DIQQAT: O'ZINGIZNING APPS SCRIPT URL MANZILINGIZNI SHU YERGA YOZING!
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyBSp-2h0b3nOVwXheyoaN8IP7oErj5RIVSNj_jvJ3SXQmMQf3B6W6f1t79U7NR8SBHgg/exec'; 

    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe?.user || { id: Math.floor(Math.random()*10000), first_name: "Test Foydalanuvchi" };

    let currentQuestions = [];
    let userAnswers = []; // To track answers for the summary
    let currentQIndex = 0;
    let score = 0;
    let currentSubject = "";

    function toggleNightMode() {
      document.body.classList.toggle('dark-mode');
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => {
        s.classList.remove('active');
        s.classList.add('hidden-down');
      });
      document.getElementById(id).classList.remove('hidden-down');
      document.getElementById(id).classList.add('active');
    }

    async function startQuiz(sheetCode, subjectName) {
      currentSubject = subjectName;
      score = 0;
      currentQIndex = 0;
      userAnswers = [];
      
      document.getElementById('subject-title').innerText = subjectName;
      document.getElementById('question-counter').innerText = "";
      document.getElementById('question-text').innerText = "Testlar yuklanmoqda. Iltimos kuting...";
      document.getElementById('options-container').innerHTML = "";
      document.getElementById('next-btn').style.display = "none";
      
      showScreen('quiz-screen');
      
      try {
        const response = await fetch(SCRIPT_URL + "?action=getQuestions&subject=" + sheetCode);
        let allQuestions = await response.json();
        
        if (allQuestions.error) {
          document.getElementById('question-text').innerText = "Xatolik: " + allQuestions.error;
          return;
        }

        if (allQuestions.length === 0) {
          document.getElementById('question-text').innerText = "Bu fanda savollar topilmadi.";
          return;
        }
        
        currentQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 25);
        loadQuestion();
      } catch (e) {
        document.getElementById('question-text').innerText = "Tarmoqda xatolik yuz berdi.";
      }
    }

    function loadQuestion() {
      document.getElementById('next-btn').style.display = 'none'; // Hide next button initially
      
      const q = currentQuestions[currentQIndex];
      document.getElementById('question-counter').innerText = `${currentQIndex + 1} / ${currentQuestions.length}`;
      document.getElementById('question-text').innerText = q.question;
      
      const correctAnswer = q.options[0]; 
      
      let validOptions = q.options.filter(opt => opt && opt.toString().trim() !== "");
      let shuffledOptions = validOptions.sort(() => 0.5 - Math.random());
      
      const container = document.getElementById('options-container');
      container.innerHTML = "";
      
      shuffledOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = (e) => checkAnswer(opt, correctAnswer, e.target);
        container.appendChild(btn);
      });
    }

    function checkAnswer(selected, correct, btnElement) {
      // Disable all buttons to prevent multiple clicks
      const allBtns = document.querySelectorAll('.option-btn');
      allBtns.forEach(b => {
        b.disabled = true;
        // Highlight the correct answer in green regardless of user choice
        if (b.innerText === correct) {
          b.style.background = '#4CAF50';
          b.style.color = '#fff';
        }
      });

      // Track logic and highlight red if wrong
      if (selected === correct) {
        score++;
      } else {
        btnElement.style.background = '#F44336';
        btnElement.style.color = '#fff';
      }

      // Save for summary
      userAnswers.push({
        question: currentQuestions[currentQIndex].question,
        selected: selected,
        correct: correct
      });

      // Show the 'Next Question' button
      document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
      currentQIndex++;
      if (currentQIndex >= currentQuestions.length) {
        finishQuiz();
      } else {
        loadQuestion();
      }
    }

    function finishQuiz() {
      // 1. Submit rating (Fixed CORS issue by using plain text)
      fetch(SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8',
        },
        body: JSON.stringify({
          userId: user.id,
          userName: user.first_name,
          subject: currentSubject,
          score: score
        })
      }).catch(e => console.log("Reytingni saqlashda xatolik:", e));

      // 2. Generate Summary HTML
      document.getElementById('final-score-text').innerText = `Sizning natijangiz: ${score} / ${currentQuestions.length}`;
      let summaryHTML = "";
      
      userAnswers.forEach((ans, index) => {
        let isCorrect = ans.selected === ans.correct;
        let color = isCorrect ? '#4CAF50' : '#F44336';
        
        summaryHTML += `
        <div class="summary-card">
            <p class="q-text">${index + 1}. ${ans.question}</p>
            <p style="color: ${color};"><b>Sizning javob:</b> ${ans.selected}</p>
            ${!isCorrect ? `<p style="color: #4CAF50;"><b>To'g'ri javob:</b> ${ans.correct}</p>` : ''}
        </div>`;
      });

      document.getElementById('summary-container').innerHTML = summaryHTML;
      
      // 3. Show Summary Screen
      showScreen('summary-screen');
    }

    async function loadRating() {
      showScreen('rating-screen');
      document.getElementById('rating-tables').innerHTML = "<div class='loader'>Yuklanmoqda...</div>";
      
      try {
        // Added a timestamp to prevent browser caching from hiding new scores
        const cacheBuster = new Date().getTime();
        const response = await fetch(SCRIPT_URL + "?action=getRating&t=" + cacheBuster);
        const data = await response.json();
        
        let html = "";
        for (let subject in data) {
          html += `<h3>${subject}</h3><table><tr><th>Ism</th><th>Ball</th></tr>`;
          if (data[subject].length === 0) {
            html += `<tr><td colspan="2">Hali natijalar yo'q</td></tr>`;
          } else {
            data[subject].forEach(userRow => {
              html += `<tr><td>${userRow.name}</td><td>${userRow.score}</td></tr>`;
            });
          }
          html += "</table>";
        }
        document.getElementById('rating-tables').innerHTML = html;
      } catch (e) {
        document.getElementById('rating-tables').innerHTML = "<p>Tarmoqda xatolik yuz berdi.</p>";
      }
    }
  </script>
</body>
</html>
