<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imtihonga Tayyorgarlik</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-color: #f4f4f9;
      --text-color: #333;
      --btn-bg: #0088cc;
      --btn-text: #fff;
    }
    body.dark-mode {
      --bg-color: #1e1e1e;
      --text-color: #f4f4f9;
      --btn-bg: #444;
    }
    body {
      margin: 0; padding: 0;
      background: var(--bg-color); color: var(--text-color);
      font-family: sans-serif; overflow: hidden;
      display: flex; justify-content: center;
    }
    .screen {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      padding: 20px; box-sizing: border-box;
      display: flex; flex-direction: column; align-items: center;
      transition: transform 0.4s ease-in-out;
      overflow-y: auto;
    }
    .active { transform: translateY(0); }
    .hidden-down { transform: translateY(100%); }
    .hidden-up { transform: translateY(-100%); }

    h1, h2, h3 { text-align: center; }
    p { font-size: 18px; text-align: center; font-weight: bold; }

    button {
      background: var(--btn-bg); color: var(--btn-text);
      border: none; padding: 15px; margin: 10px; width: 90%; max-width: 400px;
      border-radius: 8px; font-size: 18px; cursor: pointer;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.7; }
    
    .back-btn { background: #cc0000; margin-top: auto; }
    .option-btn { background: #e0e0e0; color: #333; text-align: left; }
    body.dark-mode .option-btn { background: #333; color: #f4f4f9; border: 1px solid #555; }
    
    #options-container { width: 100%; display: flex; flex-direction: column; align-items: center; }

    table { width: 100%; max-width: 400px; border-collapse: collapse; margin-bottom: 20px;}
    th, td { border: 1px solid var(--text-color); padding: 8px; text-align: center; }
    
    .loader { margin-top: 50px; font-weight: bold; font-size: 20px; }
  </style>
</head>
<body class="light-mode">

  <!-- ASOSIY MENYU -->
  <div id="main-screen" class="screen active">
    <h1>Asosiy Menyu</h1>
    <button onclick="showScreen('subjects-screen')">Test boshlash</button>
    <button onclick="loadRating()">Reyting</button>
    <button onclick="toggleNightMode()">Tungi rejim</button>
  </div>

  <!-- FANLAR EKRANI -->
  <div id="subjects-screen" class="screen hidden-down">
    <h2>Fanni tanlang</h2>
    <button onclick="startQuiz('Fan3', 'Pedagogika nazariyasi va tarixi')">Pedagogika nazariyasi</button>
    <button onclick="startQuiz('Fan4', 'Deviantologiya')">Deviantologiya</button>
    <button onclick="startQuiz('Fan5', 'Psixologik maslahat va kouching')">Psixologik maslahat</button>
    <button class="back-btn" onclick="showScreen('main-screen')">Ortga</button>
  </div>

  <!-- TEST EKRANI -->
  <div id="quiz-screen" class="screen hidden-down">
    <h2 id="subject-title"></h2>
    <h3 id="question-counter"></h3>
    <div id="quiz-content" style="width: 100%;">
      <p id="question-text">Testlar yuklanmoqda...</p>
      <div id="options-container"></div>
    </div>
    <button class="back-btn" onclick="showScreen('main-screen')">Tugatish</button>
  </div>

  <!-- REYTING EKRANI -->
  <div id="rating-screen" class="screen hidden-down">
    <h2>Reyting (Top 5)</h2>
    <div id="rating-tables" class="loader">Yuklanmoqda...</div>
    <button class="back-btn" onclick="showScreen('main-screen')">Ortga</button>
  </div>

  <!-- JAVASCRIPT QISMI -->
  <script>
    // DIQQAT: O'ZINGIZNING APPS SCRIPT URL MANZILINGIZNI SHU YERGA YOZING!
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyBSp-2h0b3nOVwXheyoaN8IP7oErj5RIVSNj_jvJ3SXQmMQf3B6W6f1t79U7NR8SBHgg/exec'; 

    const tg = window.Telegram.WebApp;
    tg.expand();

    // Telegramdan foydalanuvchi ma'lumotlarini olish (Test uchun default ma'lumot)
    const user = tg.initDataUnsafe?.user || { id: Math.floor(Math.random()*10000), first_name: "Test Foydalanuvchi" };

    let currentQuestions = [];
    let currentQIndex = 0;
    let score = 0;
    let currentSubject = "";

    function toggleNightMode() {
      document.body.classList.toggle('dark-mode');
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => {
        s.classList.remove('active');
        s.classList.add('hidden-down');
      });
      document.getElementById(id).classList.remove('hidden-down');
      document.getElementById(id).classList.add('active');
    }

    async function startQuiz(sheetCode, subjectName) {
      currentSubject = subjectName;
      score = 0;
      currentQIndex = 0;
      
      document.getElementById('subject-title').innerText = subjectName;
      document.getElementById('question-counter').innerText = "";
      document.getElementById('question-text').innerText = "Testlar yuklanmoqda. Iltimos kuting...";
      document.getElementById('options-container').innerHTML = "";
      showScreen('quiz-screen');
      
      try {
        const response = await fetch(SCRIPT_URL + "?action=getQuestions&subject=" + sheetCode);
        let allQuestions = await response.json();
        
        if (allQuestions.error) {
          document.getElementById('question-text').innerText = "Xatolik: " + allQuestions.error;
          return;
        }

        if (allQuestions.length === 0) {
          document.getElementById('question-text').innerText = "Bu fanda savollar topilmadi.";
          return;
        }
        
        // Tasodifiy 25 ta savolni ajratib olish (yoki undan kam bo'lsa borini olish)
        currentQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 25);
        loadQuestion();
      } catch (e) {
        document.getElementById('question-text').innerText = "Tarmoqda xatolik yuz berdi.";
      }
    }

    function loadQuestion() {
      if (currentQIndex >= currentQuestions.length) {
        finishQuiz();
        return;
      }
      
      const q = currentQuestions[currentQIndex];
      document.getElementById('question-counter').innerText = `${currentQIndex + 1} / ${currentQuestions.length}`;
      document.getElementById('question-text').innerText = q.question;
      
      // To'g'ri javob har doim 0-indeksda bo'ladi (Backend'dan shunday kelyapti)
      const correctAnswer = q.options[0]; 
      
      // Bo'sh bo'lmagan variantlarni olib, aralashtiramiz
      let validOptions = q.options.filter(opt => opt && opt.toString().trim() !== "");
      let shuffledOptions = validOptions.sort(() => 0.5 - Math.random());
      
      const container = document.getElementById('options-container');
      container.innerHTML = "";
      
      shuffledOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt, correctAnswer);
        container.appendChild(btn);
      });
    }

    function checkAnswer(selected, correct) {
      if (selected === correct) score++;
      currentQIndex++;
      loadQuestion();
    }

    function finishQuiz() {
      const total = currentQuestions.length;
      tg.showAlert(`Test yakunlandi!\nSizning natijangiz: ${score} / ${total}`);
      showScreen('main-screen');
      
      // Natijani yuborish
      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          userId: user.id,
          userName: user.first_name,
          subject: currentSubject,
          score: score
        })
      });
    }

    async function loadRating() {
      showScreen('rating-screen');
      document.getElementById('rating-tables').innerHTML = "<div class='loader'>Yuklanmoqda...</div>";
      
      try {
        const response = await fetch(SCRIPT_URL + "?action=getRating");
        const data = await response.json();
        
        let html = "";
        for (let subject in data) {
          html += `<h3>${subject}</h3><table><tr><th>Ism</th><th>Ball</th></tr>`;
          if (data[subject].length === 0) {
            html += `<tr><td colspan="2">Hali natijalar yo'q</td></tr>`;
          } else {
            data[subject].forEach(userRow => {
              html += `<tr><td>${userRow.name}</td><td>${userRow.score}</td></tr>`;
            });
          }
          html += "</table>";
        }
        document.getElementById('rating-tables').innerHTML = html;
      } catch (e) {
        document.getElementById('rating-tables').innerHTML = "<p>Tarmoqda xatolik yuz berdi.</p>";
      }
    }
  </script>
</body>
</html>
